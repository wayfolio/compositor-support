name: check-schema

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install check-jsonschema
        run: pip install check-jsonschema
      - name: Check
        run: check-jsonschema --schemafile data.schema.json data/*
